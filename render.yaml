services:
  - type: web
    name: papersub-ai
    runtime: node
    region: oregon
    plan: free

    buildCommand: npm install --omit=dev --no-audit --no-fund
    startCommand: node src/db/migrate.js && node src/db/seed.js && node src/server.js

    healthCheckPath: /health

    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: "10000"

      - key: TRUST_PROXY
        value: "1"

      # Required secrets — set these in the Render dashboard
      - key: SESSION_SECRET
        generateValue: true

      - key: JWT_SECRET
        generateValue: true

      - key: JWT_REFRESH_SECRET
        generateValue: true

      # Optional — set to your Render service URL once deployed
      - key: APP_URL
        value: https://papersub-ai.onrender.com

      # Optional — Google OAuth (set in Render dashboard)
      # - key: GOOGLE_CLIENT_ID
      #   sync: false
      # - key: GOOGLE_CLIENT_SECRET
      #   sync: false

      # Optional — GitHub OAuth (set in Render dashboard)
      # - key: GITHUB_CLIENT_ID
      #   sync: false
      # - key: GITHUB_CLIENT_SECRET
      #   sync: false

      # AI provider. Default is Groq (fast, free key at https://console.groq.com/keys).
      # Set the chosen provider's API key in the Render dashboard; keys are not committed here.
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_API_KEY
        sync: false

      # Optional — use OpenRouter instead of Groq (set LLM_PROVIDER=openrouter)
      # - key: OPENROUTER_MODEL
      #   value: moonshotai/kimi-k2.6:free
      # - key: OPENROUTER_API_KEY
      #   sync: false

      # Optional — API vs offline (heuristic) switch for the text features.
      # AI_PREFER_API is the global default (auto-ON when an LLM key is present).
      # The per-feature AI_FEATURE_* vars win over it; leave blank to inherit.
      #   true  = use the hosted LLM   false = use the offline heuristic
      # - key: AI_PREFER_API
      #   value: "true"
      # - key: AI_FEATURE_SUMMARY
      #   value: "true"
      # - key: AI_FEATURE_KEYWORDS
      #   value: "true"
      # - key: AI_FEATURE_TITLES
      #   value: "true"
      # - key: AI_FEATURE_ABSTRACT
      #   value: "true"
      # - key: AI_FEATURE_METADATA
      #   value: "true"
      # - key: AI_FEATURE_REVIEW
      #   value: "true"
      # - key: AI_FEATURE_AI_TEXT
      #   value: "true"

      # Optional — embeddings provider for the similarity features (reviewer
      # matching, plagiarism similarity, smart search). Default is offline TF-IDF
      # (no key, no network). Switch to a real API by setting EMBEDDINGS_PROVIDER +
      # EMBEDDINGS_API_KEY; any failure falls back to TF-IDF automatically.
      # Verified June 2026 — provider: model
      #   openai: text-embedding-3-small · jina: jina-embeddings-v3
      #   voyage: voyage-3.5-lite · mistral: mistral-embed
      #   gemini: gemini-embedding-001 · nomic: nomic-embed-text-v1.5
      # - key: EMBEDDINGS_PROVIDER
      #   value: tfidf
      # - key: EMBEDDINGS_API_KEY
      #   sync: false
      # - key: EMBEDDINGS_MODEL
      #   sync: false
      # - key: EMBEDDINGS_BASE_URL
      #   sync: false
      # - key: EMBEDDINGS_TIMEOUT_MS
      #   value: "15000"
      # - key: EMBEDDINGS_MAX_BATCH
      #   value: "64"

      # Optional — SQLite data path (Render free tier uses ephemeral disk)
      # For persistent data, upgrade to Starter and use a mounted disk
      - key: DB_PATH
        value: data/paper_submission.db

      # Optional — email (SMTP) configuration
      # - key: EMAIL_ENABLED
      #   value: "true"
      # - key: SMTP_HOST
      #   sync: false
      # - key: SMTP_PORT
      #   value: "587"
      # - key: SMTP_USER
      #   sync: false
      # - key: SMTP_PASS
      #   sync: false
      # - key: EMAIL_FROM
      #   value: noreply@papersub.ai

      # Logging
      - key: LOG_LEVEL
        value: info

      # Session cookies over HTTPS
      - key: SESSION_COOKIE_SECURE
        value: "true"
